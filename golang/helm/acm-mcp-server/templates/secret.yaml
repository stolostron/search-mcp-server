{{/* Simple test version to debug syntax issues */}}
{{- $databaseUrl := "" }}

{{- if .Values.database.autoDiscover }}
  {{- $mchList := lookup "operator.open-cluster-management.io/v1" "MultiClusterHub" "" "" }}
  {{- if $mchList.items }}
    {{- $mch := index $mchList.items 0 }}
    {{- $acmNamespace := $mch.metadata.namespace }}
    {{- $searchSecret := lookup "v1" "Secret" $acmNamespace "search-postgres" }}
    {{- if $searchSecret }}
      {{- $dbUser := index $searchSecret.data "database-user" | b64dec }}
      {{- $dbPass := index $searchSecret.data "database-password" | b64dec }}
      {{- $dbName := index $searchSecret.data "database-name" | b64dec }}
      {{- $dbHost := printf "search-postgres.%s.svc.cluster.local" $acmNamespace }}
      {{- $databaseUrl = printf "postgresql://%s:%s@%s:5432/%s" $dbUser $dbPass $dbHost $dbName }}
    {{- end }}
  {{- end }}
{{- else }}
  {{- $databaseUrl = .Values.database.url }}
{{- end }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.database.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "acm-mcp-server.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: {{ $databaseUrl | b64enc }}