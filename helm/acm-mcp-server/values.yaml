# Default values for acm-mcp-server
replicaCount: 1

image:
  repository: quay.io/stolostron/search-mcp-server
  tag: v0.1.0
  pullPolicy: Always

nameOverride: ""
fullnameOverride: ""

# Database configuration
database:
  # Auto-discovery mode (default: true)
  # When true, automatically finds ACM MultiClusterHub and extracts search-postgres credentials
  # When false, requires manual database.url configuration
  autoDiscover: true

  # Manual database URL (used when autoDiscover: false)
  # Format: postgresql://username:password@host:port/database
  # Example: "postgresql://searchuser:pass123@search-postgres.open-cluster-management.svc.cluster.local:5432/search"
  url: ""

  # Secret name to create for database URL
  secretName: acm-search-mcp-secret

# Application configuration
app:
  # Log level for application logging
  # Options: debug (enables verbose diagnostic logs), info (standard logging)
  # Note: Can be changed via kubectl edit deployment for troubleshooting
  logLevel: "info"

  # Application display name (shown in logs and MCP server info)
  displayName: "MCP Server for Red Hat ACM"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# OpenShift Route configuration
route:
  enabled: true
  host: ""  # Auto-generated if not specified
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# RBAC
rbac:
  create: true

# Pod resources
resources:
  requests:
    memory: "128Mi"
    cpu: "25m"
  # Following ACM practices, resource limits are not set

# Authentication configuration
authentication:
  # Enable authentication for production deployments
  enabled: true
  # Skip TLS verification when connecting to Kubernetes API (for testing/dev clusters)
  skipTLS: true

# Health check configuration
healthCheck:
  enabled: true
  path: /health
  port: 8080
  initialDelaySeconds: 30
  periodSeconds: 10

# Pod security context
# Note: runAsUser/runAsGroup are intentionally omitted — OpenShift automatically assigns
# a UID from the namespace's allocated SCC range (MustRunAsRange). Hardcoding UID 1001
# would fail admission since project UID ranges are typically in the 1000000000+ space.
# runAsNonRoot: true ensures the assigned UID is always non-root.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# Container security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Node selection
nodeSelector: {}
tolerations: []
affinity: {}