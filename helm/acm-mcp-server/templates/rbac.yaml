{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "acm-mcp-server.fullname" . }}-auth-role
  labels:
    {{- include "acm-mcp-server.labels" . | nindent 4 }}
rules:
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "acm-mcp-server.fullname" . }}-auth-binding
  labels:
    {{- include "acm-mcp-server.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "acm-mcp-server.fullname" . }}-auth-role
subjects:
- kind: ServiceAccount
  name: {{ include "acm-mcp-server.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}