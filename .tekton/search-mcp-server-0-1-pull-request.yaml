apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/stolostron/search-mcp-server?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/pull_request_number: '{{pull_request_number}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-cel-expression: event == "pull_request" && (target_branch
      == "main" || target_branch == "release-0.1")
  creationTimestamp: null
  labels:
    appstudio.openshift.io/application: acm-mcp-server-0-1
    appstudio.openshift.io/component: search-mcp-server-0-1
    pipelines.appstudio.openshift.io/type: build
  name: search-mcp-server-0-1-on-pull-request
  namespace: acm-mcp-server-tenant
spec:
  params:
    - name: git-url
      value: '{{source_url}}'
    - name: revision
      value: '{{revision}}'
    - name: output-image
      value: quay.io/redhat-user-workloads/acm-mcp-server-tenant/search-mcp-server-0-1:on-pr-{{revision}}
    - name: image-expires-after
      value: 5d
    - name: build-platforms
      value:
        - linux/x86_64
    - name: dockerfile
      value: Dockerfile.rhtap
    - name: path-context
      value: .
    - name: build-source-image
      value: 'true'
    - name: hermetic
      value: 'true'
    - name: prefetch-input
      value: '[{"type": "gomod", "path": "."}]'
    - name: build-args
      value:
        - MCP_VERSION=0.1
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: "https://github.com/stolostron/konflux-build-catalog.git"
      - name: revision
        value: main
      - name: pathInRepo
        value: pipelines/common-base.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-search-mcp-server-0-1
  workspaces:
    - name: git-auth
      secret:
        secretName: '{{ git_auth_secret }}'
status: {}
